name: Bug report
description: Report a problem in BIJOY-V1
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is not working?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open app\n2. Connect server\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: "Moto G62, Android 13"
    validations:
      required: false
