name: Feature request
description: Suggest a new feature for BIJOY-V1
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature idea
      description: What should be added?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is it useful?
    validations:
      required: false
