name: Release Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/release-debug-apk.yml'

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        working-directory: flutter_app
        run: flutter create . --platforms=android

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Copy APK to release name
        run: |
          mkdir -p release
          cp flutter_app/build/app/outputs/flutter-apk/app-debug.apk release/app-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIJOY-V1-debug-apk
          path: release/app-debug.apk

      - name: Publish latest debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: BIJOY-V1 Latest Debug APK
          body: Latest debug APK built automatically from main branch.
          files: release/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
